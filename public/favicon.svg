<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="SpeakIQ icon">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
  </defs>

  <!-- Speech bubble -->
  <path d="M2 3 C2 3 2 1.5 3.5 1.5 L24.5 1.5 C26 1.5 26 3 26 3 L26 20 C26 21.5 24.5 21.5 24.5 21.5 L18 21.5 L14 27 L14 21.5 L3.5 21.5 C2 21.5 2 20 2 20 Z" fill="url(#fg)"/>

  <!-- Globe inside: ellipse outline -->
  <ellipse cx="14" cy="11.5" rx="7.5" ry="7" stroke="url(#wg)" stroke-width="1.1" fill="none"/>
  <!-- Equator line -->
  <line x1="6.5" y1="11.5" x2="21.5" y2="11.5" stroke="url(#wg)" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Vertical meridian -->
  <line x1="14" y1="4.5" x2="14" y2="18.5" stroke="url(#wg)" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Top latitude arc -->
  <path d="M8.5 7.5 C11 5.5 17 5.5 19.5 7.5" stroke="url(#wg)" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <!-- Bottom latitude arc -->
  <path d="M8.5 15.5 C11 17.5 17 17.5 19.5 15.5" stroke="url(#wg)" stroke-width="1.1" stroke-linecap="round" fill="none"/>
</svg>
