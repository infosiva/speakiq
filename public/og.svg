<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030305"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="50"/></filter>
    <clipPath id="clip"><rect width="1200" height="630"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <ellipse cx="200" cy="180" rx="380" ry="320" fill="url(#orb1)" filter="url(#blur1)" clip-path="url(#clip)"/>
  <ellipse cx="1050" cy="480" rx="320" ry="280" fill="url(#orb2)" filter="url(#blur2)" clip-path="url(#clip)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#brand)"/>

  <!-- LEFT SIDE: branding + text (x: 80–560) -->

  <!-- Icon -->
  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="64" height="48" rx="10" fill="url(#brand)" opacity="0.9"/>
    <polygon points="16,48 16,60 28,48" fill="url(#brand)" opacity="0.9"/>
    <ellipse cx="32" cy="24" rx="16" ry="14" stroke="white" stroke-width="2" fill="none" opacity="0.7"/>
    <line x1="16" y1="24" x2="48" y2="24" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="32" y1="10" x2="32" y2="38" stroke="white" stroke-width="2" opacity="0.7"/>
    <path d="M19 17 C26 13 38 13 45 17" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M19 31 C26 35 38 35 45 31" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="160" y="170" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="68" fill="white" letter-spacing="-2">Speak</text>
  <text x="160" y="248" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="68" fill="url(#brand)" letter-spacing="-2">IQ</text>

  <!-- Tagline -->
  <text x="80" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.5)">Your AI language tutor — available 24/7</text>

  <!-- Divider -->
  <rect x="80" y="330" width="480" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Feature pills (2 rows of 2) -->
  <!-- Row 1 -->
  <rect x="80" y="350" width="160" height="38" rx="19" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="160" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">🌍 50+ Languages</text>

  <rect x="256" y="350" width="172" height="38" rx="19" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="342" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">💬 7 Practice Modes</text>

  <!-- Row 2 -->
  <rect x="80" y="402" width="158" height="38" rx="19" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="159" y="426" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">🔥 Streak Tracking</text>

  <rect x="254" y="402" width="148" height="38" rx="19" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.35)" stroke-width="1"/>
  <text x="328" y="426" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">⚡ Free to Start</text>

  <!-- CTA badge -->
  <rect x="80" y="466" width="190" height="46" rx="12" fill="url(#brand)"/>
  <text x="175" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="white" text-anchor="middle" font-weight="700">speakiq.app</text>

  <!-- RIGHT SIDE: mock conversation card (x: 640–1120) -->
  <g transform="translate(640, 80)">
    <!-- Card bg -->
    <rect x="0" y="0" width="400" height="460" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Card header -->
    <rect x="0" y="0" width="400" height="56" rx="20" fill="rgba(124,58,237,0.15)"/>
    <rect x="0" y="36" width="400" height="20" fill="rgba(124,58,237,0.15)"/>
    <circle cx="30" cy="28" r="14" fill="url(#brand)"/>
    <text x="30" y="34" font-family="system-ui" font-size="14" fill="white" text-anchor="middle">🤖</text>
    <text x="54" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" font-weight="700">SpeakIQ Tutor</text>
    <text x="54" y="41" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Spanish · Intermediate</text>

    <!-- AI message -->
    <rect x="16" y="72" width="270" height="60" rx="12" fill="rgba(124,58,237,0.25)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="30" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">¡Hola! ¿Cómo estuvo tu</text>
    <text x="30" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">fin de semana? 🌞</text>

    <!-- User message -->
    <rect x="114" y="148" width="270" height="60" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="128" y="171" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Estuvo muy bien, fui</text>
    <text x="128" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">al mercado con familia.</text>

    <!-- Grammar tip chip -->
    <rect x="16" y="224" width="368" height="52" rx="10" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
    <text x="30" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#06b6d4" font-weight="700">✨ Grammar tip</text>
    <text x="30" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Say "con mi familia" — great effort!</text>

    <!-- AI reply -->
    <rect x="16" y="292" width="270" height="60" rx="12" fill="rgba(124,58,237,0.25)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="30" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">¡Qué bien! ¿Qué compraste</text>
    <text x="30" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">en el mercado? 🛒</text>

    <!-- User reply -->
    <rect x="114" y="368" width="270" height="60" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="128" y="391" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Compré frutas y verduras.</text>
    <text x="128" y="412" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">¡Me encantó! 😊</text>
  </g>
</svg>
