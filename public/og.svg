<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030305"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <clipPath id="clip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <ellipse cx="250" cy="200" rx="350" ry="300" fill="url(#orb1)" filter="url(#blur1)" clip-path="url(#clip)"/>
  <ellipse cx="1000" cy="450" rx="300" ry="280" fill="url(#orb2)" filter="url(#blur2)" clip-path="url(#clip)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#brand)"/>

  <!-- Icon — speech bubble with globe -->
  <g transform="translate(120, 200)">
    <rect x="0" y="0" width="72" height="52" rx="10" fill="url(#brand)" opacity="0.9"/>
    <polygon points="20,52 20,64 32,52" fill="url(#brand)" opacity="0.9"/>
    <!-- globe lines -->
    <ellipse cx="36" cy="26" rx="18" ry="16" stroke="white" stroke-width="2" fill="none" opacity="0.7"/>
    <line x1="18" y1="26" x2="54" y2="26" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="36" y1="10" x2="36" y2="42" stroke="white" stroke-width="2" opacity="0.7"/>
    <path d="M22 18 C29 14 43 14 50 18" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M22 34 C29 38 43 38 50 34" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="216" y="254" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="-2">Speak</text>
  <text x="440" y="254" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="72" letter-spacing="-2">
    <defs>
      <linearGradient id="iqgrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#06b6d4"/>
      </linearGradient>
    </defs>
    <tspan fill="url(#iqgrad)">IQ</tspan>
  </text>

  <!-- Tagline -->
  <text x="120" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="rgba(255,255,255,0.55)" letter-spacing="0">Your AI language tutor — available 24/7</text>

  <!-- Divider -->
  <rect x="120" y="340" width="960" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Feature pills -->
  <g transform="translate(120, 368)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="168" height="40" rx="20" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <text x="84" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">🌍 50+ Languages</text>

    <!-- Pill 2 -->
    <rect x="184" y="0" width="180" height="40" rx="20" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <text x="274" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">💬 7 Practice Modes</text>

    <!-- Pill 3 -->
    <rect x="380" y="0" width="162" height="40" rx="20" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <text x="461" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">🔥 Streak Tracking</text>

    <!-- Pill 4 -->
    <rect x="558" y="0" width="148" height="40" rx="20" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.35)" stroke-width="1"/>
    <text x="632" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">⚡ Free to Start</text>
  </g>

  <!-- CTA badge -->
  <rect x="120" y="444" width="200" height="48" rx="12" fill="url(#brand)"/>
  <text x="220" y="474" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="700">speakiq.app</text>

  <!-- Right side — mock conversation card -->
  <g transform="translate(740, 130)">
    <!-- Card bg -->
    <rect x="0" y="0" width="340" height="360" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Card header -->
    <rect x="0" y="0" width="340" height="52" rx="20" fill="rgba(124,58,237,0.15)"/>
    <rect x="0" y="32" width="340" height="20" fill="rgba(124,58,237,0.15)"/>
    <circle cx="26" cy="26" r="12" fill="url(#brand)"/>
    <text x="26" y="31" font-family="system-ui" font-size="14" fill="white" text-anchor="middle">🤖</text>
    <text x="48" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" font-weight="700">SpeakIQ Tutor</text>
    <text x="48" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Spanish · Intermediate</text>

    <!-- AI message bubble -->
    <rect x="16" y="68" width="240" height="58" rx="12" fill="rgba(124,58,237,0.25)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="28" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">¡Hola! ¿Cómo estuvo tu</text>
    <text x="28" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">fin de semana? 🌞</text>

    <!-- User message bubble -->
    <rect x="84" y="142" width="240" height="58" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="96" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Estuvo muy bien, fui</text>
    <text x="96" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">al mercado con familia.</text>

    <!-- AI correction chip -->
    <rect x="16" y="216" width="308" height="48" rx="10" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
    <text x="28" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#06b6d4" font-weight="700">✨ Grammar tip</text>
    <text x="28" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Say "con mi familia" — great effort!</text>

    <!-- AI reply -->
    <rect x="16" y="280" width="240" height="58" rx="12" fill="rgba(124,58,237,0.25)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="28" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">¡Qué bien! ¿Qué compraste</text>
    <text x="28" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">en el mercado? 🛒</text>
  </g>

  <!-- Trust bar at bottom -->
  <text x="600" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.3)" text-anchor="middle">★★★★★  4.8/5 · 2,400+ learners · Free forever plan</text>
</svg>
