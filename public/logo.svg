<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none" role="img" aria-label="SpeakIQ logo">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>

  <!-- Speech bubble icon -->
  <!-- Outer bubble body -->
  <path d="M6 4 C6 4 6 2 8 2 L34 2 C36 2 36 4 36 4 L36 26 C36 28 34 28 34 28 L22 28 L17 34 L17 28 L8 28 C6 28 6 26 6 26 Z" fill="url(#grad)"/>

  <!-- Globe lines inside bubble: horizontal arc waves -->
  <!-- Vertical center line (meridian) -->
  <path d="M21 8 C21 8 21 24 21 24" stroke="url(#waveGrad)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Equator -->
  <path d="M10 16 L32 16" stroke="url(#waveGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Top arc -->
  <path d="M13 10 C17 7 25 7 29 10" stroke="url(#waveGrad)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Bottom arc -->
  <path d="M13 22 C17 25 25 25 29 22" stroke="url(#waveGrad)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Outer ellipse ring -->
  <ellipse cx="21" cy="16" rx="11" ry="10" stroke="url(#waveGrad)" stroke-width="1.2" fill="none"/>

  <!-- Wordmark "SpeakIQ" -->
  <text x="48" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="white">Speak</text>
  <text x="128" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="url(#grad)">IQ</text>
</svg>
